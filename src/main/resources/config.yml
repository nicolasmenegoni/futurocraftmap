# REAL_HOURS = usa horas/dias do mundo real.
# REAL_MINUTES = usa minutos do mundo real.
# TICKS = usa ticks do servidor no mundo (fullTime).
time:
  mode: REAL_MINUTES

# Em REAL_HOURS, valor em horas (24 = 1 dia, 48 = 2 dias).
# Em REAL_MINUTES, valor em minutos.
# Em TICKS, valor absoluto em ticks.
regeneration:
  threshold: 1

removal:
  threshold: 1
